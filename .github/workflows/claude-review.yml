name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    name: AI Code Review
    runs-on: ubuntu-latest
    # Skip if PR is from dependabot or has [skip-review] in title
    if: >
      !contains(github.event.pull_request.title, '[skip-review]') &&
      github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Get PR diff
        run: |
          git diff origin/${{ github.event.pull_request.base.ref }}...HEAD > /tmp/pr-diff.txt
          echo "DIFF_SIZE=$(wc -c < /tmp/pr-diff.txt)" >> $GITHUB_ENV

      - name: Run Claude Review
        if: env.DIFF_SIZE != '0'
        env:
          # Claude CLI auth — set ONE of these as a GitHub secret:
          # Option 1: Claude subscription OAuth token (from `claude setup-token`).
          # The CLI reads CLAUDE_CODE_OAUTH_TOKEN; our secret is named CLAUDE_CODE_AUTH_TOKEN.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_AUTH_TOKEN }}
          # Option 2: If you later get an API key, this also works
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: node .github/scripts/claude-review.mjs

      - name: Post Review Comment
        if: env.DIFF_SIZE != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('/tmp/review.md')) {
              console.log('No review file found — skipping');
              return;
            }
            const review = fs.readFileSync('/tmp/review.md', 'utf8');
            if (!review.trim()) return;

            // Find and update existing bot comment, or create new one
            const marker = '<!-- claude-review-bot -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            const body = `${marker}\n## Claude Code Review\n\n${review}\n\n---\n*Automated review powered by Claude — triggered on every push*`;

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

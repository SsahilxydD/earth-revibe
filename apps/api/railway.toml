[build]
builder = "nixpacks"
buildCommand = "pnpm install --frozen-lockfile --prod=false && pnpm turbo build --filter=@earth-revibe/api"

[deploy]
startCommand = "node apps/api/dist/index.js"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[services]]
name = "earth-revibe-api"

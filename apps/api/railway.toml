# redeploy-marker: 2026-05-27 (bumped healthcheckTimeout; #54 cold-start hit the 30s wall)
[build]
builder = "nixpacks"
buildCommand = "pnpm install --frozen-lockfile && pnpm turbo build --filter=@earth-revibe/api"

[deploy]
# Regenerate the Prisma client + apply pending migrations before app boot.
# Mirrors the package.json `start` script — Railway uses this railway.toml
# override instead of `pnpm start`, so the chain has to live here too.
# Without this, schema migrations land in git but never get applied to prod
# (recovered manually on 2026-05-06; see project_railway_migration_silent_skip
# memory entry). The && short-circuits if migrate fails — node never starts,
# so prior healthy state is preserved.
startCommand = "pnpm -F @earth-revibe/db db:generate && pnpm -F @earth-revibe/db db:migrate:deploy && node apps/api/dist/index.js"
healthcheckPath = "/api/v1/health"
# 30s was too tight: prisma generate + migrate deploy + node boot consumed the
# whole window on the reviews deploy (commit bb9e57b). 90s gives clean margin
# without weakening the migrate-first-or-don't-start safety chain above.
healthcheckTimeout = 90
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[services]]
name = "earth-revibe-api"
